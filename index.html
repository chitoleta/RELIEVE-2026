<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RELIEVE 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Arial', 'Helvetica', sans-serif;
        }

        body {
            background: linear-gradient(rgba(0, 0, 0, 0.6), rgba(0, 0, 0, 0.6)), url("RELIEVEIMAGEN.jpeg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        h1 {
            font-size: 48px;
            text-align: center;
            margin-bottom: 20px;
            font-weight: bold;
            text-shadow: 0 4px 15px rgba(0, 0, 0, 0.8);
            letter-spacing: 2px;
        }

        .subtitle {
            font-size: 18px;
            text-align: center;
            margin-bottom: 30px;
            opacity: 0.9;
            text-shadow: 0 2px 8px rgba(0, 0, 0, 0.8);
        }

        .buttons-container {
            display: flex;
            flex-direction: column;
            gap: 18px;
            width: 100%;
        }

        .main-button {
            background: rgba(255, 255, 255, 0.95);
            color: #000;
            padding: 20px;
            border-radius: 18px;
            text-align: center;
            text-decoration: none;
            font-size: 18px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        .main-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5);
            background: white;
        }

        .main-button:active {
            transform: translateY(-1px);
        }

        footer {
            margin-top: 40px;
            font-size: 14px;
            opacity: 0.8;
            text-align: center;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.8);
        }

        /* Responsive para celulares */
        @media (max-width: 768px) {
            body {
                background-attachment: scroll;
                padding: 15px;
            }

            .container {
                gap: 20px;
            }

            h1 {
                font-size: 40px;
                margin-bottom: 15px;
            }

            .subtitle {
                font-size: 16px;
                margin-bottom: 25px;
            }

            .buttons-container {
                gap: 15px;
            }

            .main-button {
                padding: 18px 16px;
                font-size: 16px;
                border-radius: 16px;
            }
        }

        @media (max-width: 480px) {
            h1 {
                font-size: 32px;
            }

            .main-button {
                padding: 16px 14px;
                font-size: 15px;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>RELIEVE<br>2026</h1>
        <p class="subtitle">University of California, Davis</p>
        
        <div class="buttons-container">
            <a href="https://script.google.com/macros/s/AKfycbwnIdPhAZXMCQZ22PK-Dryk7PDv9ZeDXszy9gVYa7v1pWTh8siBFd1O-yILfBH0xb8/exec" target="_blank" rel="noopener noreferrer" class="main-button">SCHEDULES</a>
            
            <a href="https://drive.google.com/file/d/19aRYAheLIo5c_Je3hWPC3Q_WGdSUn3t6/view" class="main-button">CONGRESS FLYER</a>
            
            <a href="hoy.html" class="main-button">WHAT'S HAPPENING TODAY?</a>
            
            <a href="indexmapa.html" class="main-button">MAP OF THE CONFERENCE CENTER</a>
        </div>
        
        <footer>RELIEVE 2026</footer>
    </div>
</body>

</html>
