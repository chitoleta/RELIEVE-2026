<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's Happening Today?</title>

    <style>
        body {
            margin: 0;
            padding: 15px;
            background: #111;
            color: white;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
            font-size: 22px;
        }

        /* Flexible container to separate images vertically */
        #content {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px; /* Vertical space between images */
        }

        img {
            width: 100%;
            max-width: 450px;
            height: auto;
            max-height: 70vh;
            object-fit: contain;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(0,0,0,.5);
        }

        .button {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: white;
            color: black;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <h1 id="title"></h1>

    <div id="content"></div>

    <div>
        <a href="index.html" class="button">← Back</a>
    </div>

    <script>
        // 1. Force date retrieval adjusted to Davis timezone (America/Los_Angeles)
        const timeOptions = { timeZone: 'America/Los_Angeles', day: 'numeric', month: 'numeric' };
        const californiaDate = new Intl.DateTimeFormat('en-US', timeOptions).format(new Date());

        // californiaDate returns a string like "7/23" (month/day)
        const [calculatedMonth, calculatedDay] = californiaDate.split('/').map(Number);

        // Assign validated variables
        const day = calculatedDay;
        const isJuly = calculatedMonth === 7; // Set for July (Month 7)

        // 2. Schedule definition by days in July (20th to 24th)
        const schedule = {
            20: {
                title: "July 20 Presentations",
                images: [
                    "IMAGE20_1.png",
                    "IMAGE20_2.png",
                    "IMAGE20_3.png"
                ]
            },
            21: {
                title: "July 21 Presentations",
                images: [
                    "IMAGE21_1.png",
                    "IMAGE21_2.png",
                    "IMAGE21_3.png",
                    "IMAGE21_4.png"
                ]
            },
            22: {
                title: "July 22 Presentations",
                images: [
                    "IMAGE22_1.png",
                    "IMAGE22_2.png"
                ]
            },
            23: {
                title: "July 23 Presentations",
                images: [
                    "IMAGE23_1.png",
                    "IMAGE23_2.png",
                    "IMAGE23_3.png",
                    "IMAGE23_4.png",
                    "IMAGE23_5.png",
                    "IMAGE23_6.png",
                    "IMAGE23_7.png",
                    "IMAGE23_8.png",
                    "IMAGE23_9.png"
                ]
            },
            24: {
                title: "July 24 Presentations",
                images: [
                    "IMAGE24_22.png",
                    "IMAGE24_32.png",
                    "IMAGE24_42.png",
                    "IMAGE24_52.png"
                ]
            }
        };

        // 3. Final validation using California real-time
        if (isJuly && schedule[day]) {
            document.getElementById("title").innerText = schedule[day].title;
            
            // Dynamically generate <img> tags
            const htmlImages = schedule[day].images.map(imgUrl => {
                return `<img src="${imgUrl}" alt="Schedule for July ${day}">`;
            }).join(''); 
            
            document.getElementById("content").innerHTML = htmlImages;

        } else {
            // Fallback message if it's not a conference day
            document.getElementById("title").innerText = "RELIEVE 2026";
            document.getElementById("content").innerHTML = "<div id='message' style='margin-top:20px; color:#aaa;'>No activities scheduled for today.</div>";
        }
    </script>

</body>
</html>
